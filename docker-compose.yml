services:
  server:
    build:
      context: ./server
    environment:
      PORT: 5000
      MONGODB_URI: mongodb://mongo:27017/mini-visitor-crm
      JWT_SECRET: your_super_secret_key
    ports:
      - "5000:5000"
    depends_on:
      - mongo

  client:
    build:
      context: ./client
      args:
        NEXT_PUBLIC_API_URL: http://localhost:5000/api
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:5000/api
    ports:
      - "3000:3000"
    depends_on:
      - server

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data: